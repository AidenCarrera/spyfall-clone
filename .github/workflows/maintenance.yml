name: Maintenance

on:
  schedule:
    # Run once per week (every Sunday at 00:00 UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  health-check:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: curl --fail "${{ secrets.HEALTH_CHECK_URL }}"
